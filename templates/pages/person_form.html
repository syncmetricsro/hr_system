{% extends "layouts/base.html" %}
{% load i18n %}

{% block title %}{% trans "Add person" %} · Jober{% endblock %}

{% block content %}
<section class="page-head">
  <p class="eyebrow">{% trans "Intake" %}</p>
  <h1>{% trans "Add person" %}</h1>
  <a class="button button-secondary" href="{% url 'people_list' %}">{% trans "Back to people" %}</a>
</section>

<section class="panel">
  <form class="stack" method="post" action="{% url 'person_create' %}">
    {% csrf_token %}
    {{ form.as_p }}
    <button class="button button-primary" type="submit">{% trans "Save" %}</button>
  </form>
</section>
{% endblock %}
