{% extends "layouts/base.html" %}
{% load i18n %}

{% block title %}{{ heading }} · {{ BRAND_NAME }}{% endblock %}

{% block content %}
<section class="page-head">
  <p class="eyebrow">{% trans "Intake" %}</p>
  <h1>{{ heading }}</h1>
  <a class="button button-secondary" href="{% url 'people_list' %}">{% trans "Back to people" %}</a>
</section>

<section class="panel">
  <form class="stack" method="post" action="{{ form_action }}" x-data="{ hasDisability: {{ form.has_disability.value|yesno:'true,false' }} }">
    {% csrf_token %}
    {{ form.as_p }}
    <button class="button button-primary" type="submit">{% trans "Save" %}</button>
  </form>
</section>
{% endblock %}
