{% load i18n %}
<div id="field-panel" class="field-list" aria-live="polite">
  {% for project in projects %}
    <article class="field-card">
      <div>
        <h3>{{ project.name }}</h3>
        <p>{% trans "Responsible" %}: {{ project.coordinator }}</p>
      </div>
      <dl>
        <div>
          <dt>{% trans "Readiness" %}</dt>
          <dd>{{ project.readiness }}</dd>
        </div>
        <div>
          <dt>{% trans "Missing" %}</dt>
          <dd>{{ project.needs }}</dd>
        </div>
      </dl>
    </article>
  {% endfor %}
</div>
